id: amazon-translate
name: Amazon Translate
description: Shared capability definition for Amazon Translate
namespace: amazon-translate
operations:
- operationId: TranslateText
  method: POST
  path: /#TranslateText
  summary: Amazon Translate Translate Text in Real Time
- operationId: StartTextTranslationJob
  method: POST
  path: /#StartTextTranslationJob
  summary: Amazon Translate Start a Batch Translation Job
- operationId: ListTextTranslationJobs
  method: POST
  path: /#ListTextTranslationJobs
  summary: Amazon Translate List Batch Translation Jobs
- operationId: ImportTerminology
  method: POST
  path: /#ImportTerminology
  summary: Amazon Translate Import Custom Terminology
